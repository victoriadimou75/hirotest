<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR App Inventor Demo</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <!-- Component για κείμενο με πλήρη υποστήριξη Unicode (άρα και ελληνικά) -->
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
  <style>
    html, body { margin: 0; overflow: hidden; height: 100%; background: transparent; }
    .arjs-loader {
      height: 100%; width: 100%; position: absolute; top: 0; left: 0;
      background-color: rgba(0,0,0,0.8); z-index: 9999; display:flex;
      justify-content:center; align-items:center;
    }
    .arjs-loader div { color:white; font-size:1.2em; text-align:center; font-family:sans-serif; }
  </style>
</head>
<body>

  <div class="arjs-loader">
    <div>Φόρτωση AR... Δώσε άδεια στην κάμερα όταν σου ζητηθεί</div>
  </div>

  <!--
    ΑΛΛΑΞΕ ΑΥΤΑ ΤΑ ΔΥΟ ΟΝΟΜΑΤΑ ΑΡΧΕΙΩΝ ΜΕ ΤΑ ΔΙΚΑ ΣΟΥ:
    1) "pattern-marker.patt"  -> το αρχείο που κατέβασες από το marker generator
                                  (ή preset="hiro" αν δοκιμάζεις ακόμα με Hiro)
    2) "content.png"          -> η εικόνα που θέλεις να εμφανίζεται πάνω στο marker
  -->

  <a-scene embedded
           arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
           vr-mode-ui="enabled: false"
           renderer="logarithmicDepthBuffer: true;">

    <a-assets>
      <img id="contentImg" src="content.png" crossorigin="anonymous">
    </a-assets>

    <<a-marker type="pattern" url="pattern-Espresso.patt" id="my-marker"
               smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

      <!-- Η εικόνα που εμφανίζεται πάνω στο marker -->
      <a-image src="#contentImg"
               position="0 0.9 0"
               rotation="-90 0 0"
               width="2"
               height="1.3"
               material="transparent: true; shader: flat;">
      </a-image>

      <!-- Το κείμενο, τώρα με troika-text (υποστηρίζει ελληνικά) -->
      <a-entity troika-text="value: Το κείμενό σου εδώ; fontSize: 0.2; color: #000000; anchor: center; align: center;"
                position="0 0.15 0"
                rotation="-90 0 0">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      const loader = document.querySelector('.arjs-loader');
      if (loader) loader.style.display = 'none';
    });

    const marker = document.querySelector('#my-marker');
    marker.addEventListener('markerFound', () => console.log('Marker found!'));
    marker.addEventListener('markerLost', () => console.log('Marker lost.'));
  </script>

</body>
</html>

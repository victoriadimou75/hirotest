<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>AR App Inventor Demo</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    html, body { margin: 0; overflow: hidden; height: 100%; background: transparent; }
    .arjs-loader {
      height: 100%; width: 100%; position: absolute; top: 0; left: 0;
      background-color: rgba(0,0,0,0.8); z-index: 9999; display:flex;
      justify-content:center; align-items:center;
    }
    .arjs-loader div { color:white; font-size:1.2em; text-align:center; font-family:sans-serif; }
  </style>
</head>
<body>

  <div class="arjs-loader">
    <div>Φόρτωση AR... Δώσε άδεια στην κάμερα όταν σου ζητηθεί</div>
  </div>

  <!--
    ΣΗΜΑΝΤΙΚΟ:
    - preset="hiro" -> αναγνωρίζει το ΕΤΟΙΜΟ marker "Hiro" (βλ. οδηγίες παρακάτω για εκτύπωση)
    - Αν θέλεις ΔΙΚΟ ΣΟΥ marker, άλλαξε το <a-marker> block πιο κάτω
      σε: <a-marker type="pattern" url="pattern-marker.patt">
  -->
  <a-scene embedded
           arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
           vr-mode-ui="enabled: false"
           renderer="logarithmicDepthBuffer: true;">

    <a-assets>
      <!-- Εδώ μπορείς να βάλεις 3D μοντέλα (.gltf), εικόνες, βίντεο -->
    </a-assets>

    <a-marker preset="hiro" id="hiro-marker" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <!-- Ό,τι βάλεις εδώ μέσα εμφανίζεται ΠΑΝΩ στο marker όταν το βλέπει η κάμερα -->
      <a-box position="0 0.5 0" material="color: #4CC3D9; opacity: 0.9" scale="1 1 1">
        <a-animation attribute="rotation" dur="4000" to="0 360 0" repeat="indefinite" easing="linear"></a-animation>
      </a-box>
      <a-text value="AR App Inventor" position="0 1.3 0" align="center" color="black" width="4"></a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Κρύβει το μήνυμα φόρτωσης μόλις ξεκινήσει η κάμερα
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      const loader = document.querySelector('.arjs-loader');
      if (loader) loader.style.display = 'none';
    });

    // Ενημέρωση όταν βρεθεί/χαθεί το marker (χρήσιμο για debugging)
    const marker = document.querySelector('#hiro-marker');
    marker.addEventListener('markerFound', () => console.log('Marker found!'));
    marker.addEventListener('markerLost', () => console.log('Marker lost.'));
  </script>

</body>
</html>
